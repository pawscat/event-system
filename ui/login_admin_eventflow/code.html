<body class="bg-background-subtle h-screen w-full font-body-md text-text-main overflow-hidden flex">
<!-- Left Column: Form Section -->
<div class="w-full lg:w-1/2 flex flex-col justify-center items-center px-6 py-12 lg:px-24 bg-surface-container-lowest shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10 relative h-full">
<div class="w-full max-w-sm flex flex-col items-center">

<div class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">dataset</span>

</div>
<!-- Form Container -->
<form class="w-full space-y-5" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label-md text-text-main" for="email">Email Admin</label>
<div class="relative input-focus-ring rounded-lg transition-shadow">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-[20px]">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-2.5 bg-surface border border-border-light rounded-lg font-body-md text-text-main placeholder:text-text-muted focus:ring-1 focus:ring-primary focus:border-primary transition-colors outline-none" id="email" name="email" placeholder="admin@perusahaan.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block font-label-md text-text-main" for="password">Kata Sandi</label>
<div class="relative input-focus-ring rounded-lg transition-shadow">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-[20px]">lock</span>
</div>
<input class="block w-full pl-11 pr-11 py-2.5 bg-surface border border-border-light rounded-lg font-body-md text-text-main placeholder:text-text-muted focus:ring-1 focus:ring-primary focus:border-primary transition-colors outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-text-muted hover:text-primary transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibilityIcon">visibility_off</span>
</button>
</div>
</div>
<!-- Secondary Actions -->
<div class="flex items-center justify-between pt-1">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-border-light text-primary focus:ring-primary focus:ring-offset-0 bg-surface cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-text-muted cursor-pointer select-none" for="remember-me">
                            Ingat saya
                        </label>
</div>
<div class="text-sm">
<a class="font-label-sm text-primary hover:text-secondary-container transition-colors" href="#">
                            Lupa kata sandi?
                        </a>
</div>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                        Masuk Dashboard
                    </button>
</div>
</form>
<!-- Footer text -->
<p class="mt-10 font-body-sm text-text-muted text-center">

<!-- Micro-interaction Script -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibilityIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
